    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    cursor: pointer;
}

video {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    transform: translate(-50%, -50%);
    object-fit: contain; /* cover se vuoi riempire tutto */
    pointer-events: none;
}
    </style>
</head>
<body>

</video>
