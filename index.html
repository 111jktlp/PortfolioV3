<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enrico Cesarin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ─────────────────────────────────────────
   RESET
───────────────────────────────────────── */

*,
*::before,
*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  overflow-x:hidden;
}

body{
  background:#000;
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */

header{
  position:fixed;
  top:0;
  left:0;
  z-index:100;

  width:100%;
  padding:18px 40px;

  display:flex;
  align-items:center;

  background:transparent;
}

.logo{
  font-size:.8rem;
  font-weight:700;
  letter-spacing:2.5px;
  text-transform:uppercase;
  opacity:.9;
  z-index:2;
}

.main-nav{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:42px;
}

.nav-link{
  position:relative;
  text-decoration:none;
  color:#8d8d8d;
  font-size:.72rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:3px;
  transition:color .3s ease;
}

.nav-link:hover{
  color:#fff;
}

.nav-link::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-8px;
  width:100%;
  height:1px;
  background:#fff;
  transform:scaleX(0);
  transform-origin:center;
  transition:transform .35s ease;
}

.nav-link:hover::after{
  transform:scaleX(1);
}

.nav-link.active{
  color:#fff;
}

.nav-link.active::after{
  transform:scaleX(1);
}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */

.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:120px 60px 80px;
}

.hero-grid{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:140px;
}

.portal-link{
  text-decoration:none;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

.portal-link img{
  width:clamp(240px, 24vw, 360px);
  aspect-ratio:1 / 1;
  object-fit:contain;
  display:block;
  opacity:.82;
  transition:
    transform .55s ease,
    opacity .55s ease;
}

.portal-link:hover img{
  transform:scale(1.12);
  opacity:1;
}

.portal-link span{
  margin-top:24px;
  font-size:.72rem;
  font-weight:500;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#9a9a9a;
  transition:
    color .35s ease,
    letter-spacing .35s ease;
}

.portal-link:hover span{
  color:white;
  letter-spacing:5px;
}

/* ─────────────────────────────────────────
   FOOTER
───────────────────────────────────────── */

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:28px 20px;
  display:flex;
  justify-content:center;
}

.social-links{
  display:flex;
  gap:34px;
}

.social-links a{
  color:white;
  font-size:1.4rem;
  transition:
    opacity .3s ease,
    transform .3s ease;
}

.social-links a:hover{
  opacity:.55;
  transform:translateY(-2px);
}

/* ─────────────────────────────────────────
   GLITCH
───────────────────────────────────────── */

.glitch-fragment{
  position:fixed;
  background:white;
  mix-blend-mode:screen;
  pointer-events:none;
  animation:glitchOut 2s forwards;
}

@keyframes glitchOut{
  0%{opacity:1; transform:translate(0,0);}
  50%{opacity:.8;}
  100%{opacity:0; transform:translate(var(--dx), var(--dy));}
}

/* ─────────────────────────────────────────
   HAMBURGER
───────────────────────────────────────── */

.menu-toggle{
  display:none;
  background:none;
  border:none;
  cursor:pointer;
  padding:4px;
  z-index:1002;
  position:relative;
}

.menu-toggle span{
  display:block;
  width:22px;
  height:1px;
  background:white;
  margin:5px 0;
  transition:transform .35s ease, opacity .35s ease;
}

/* ─────────────────────────────────────────
   MOBILE
───────────────────────────────────────── */

@media(max-width:900px){

  header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 22px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:1000;
  }

  .logo{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
  }

  .menu-toggle{
    display:block;
    position:absolute;
    right:22px;
  }

  .menu-toggle.active span:nth-child(1){
    transform:translateY(6px) rotate(45deg);
  }
  .menu-toggle.active span:nth-child(2){
    opacity:0;
  }
  .menu-toggle.active span:nth-child(3){
    transform:translateY(-6px) rotate(-45deg);
  }

  .main-nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:40px;

    transform:translateX(100%);
    visibility:hidden;
    opacity:0;

    transition:
      transform .45s ease,
      opacity   .35s ease,
      visibility 0s linear .45s;

    z-index:999;
  }

  .main-nav.open{
    transform:translateX(0);
    visibility:visible;
    opacity:1;
    transition:
      transform .45s ease,
      opacity   .35s ease,
      visibility 0s linear 0s;
  }

  .main-nav .nav-link{
    font-size:1rem;
    letter-spacing:4px;
  }

  .hero{
    padding:140px 22px 80px;
  }

  .hero-grid{
    flex-direction:column;
    gap:80px;
  }

  .portal-link img{
    width:min(72vw, 300px);
  }

  footer{
    position:relative;
    padding:60px 20px 40px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">ENRICO CESARIN</div>

  <button class="menu-toggle" id="menu-toggle" aria-label="Menu" aria-expanded="false" aria-controls="mobile-nav">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="main-nav" id="mobile-nav">
    <a href="index.html" class="nav-link active">Home</a>
    <a href="works.html" class="nav-link">Works</a>
    <a href="about.html" class="nav-link">About</a>
  </nav>
</header>

<!-- HERO -->
<main class="hero">
  <div class="hero-grid">

    <a href="works.html" class="portal-link">
      <img src="assets/img/ChatGPT%20Image%206%20mag%202026,%2015_50_59.png" alt="Works">
      <span>Works</span>
    </a>

    <a href="about.html" class="portal-link">
      <img src="assets/img/ChatGPT%20Image%206%20mag%202026,%2015_50_59.png" alt="About">
      <span>About</span>
    </a>

  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="social-links">
    <a href="https://www.instagram.com/jacktulo/" target="_blank" aria-label="Instagram">
      <i class="fa-brands fa-instagram"></i>
    </a>
    <a href="https://on.soundcloud.com/Hu8hjfZL8MQTzkFNN5" target="_blank" aria-label="SoundCloud">
      <i class="fa-brands fa-soundcloud"></i>
    </a>
    <a href="https://open.spotify.com/" target="_blank" aria-label="Spotify">
      <i class="fa-brands fa-spotify"></i>
    </a>
    <a href="mailto:enri.cesarin4@gmail.com" aria-label="Email">
      <i class="fa-regular fa-envelope"></i>
    </a>
  </div>
</footer>

<script>
  // ── Hamburger ──
  const menuToggle = document.getElementById('menu-toggle');
  const mobileNav  = document.getElementById('mobile-nav');

  menuToggle.addEventListener('click', () => {
    const isOpen = mobileNav.classList.toggle('open');
    menuToggle.classList.toggle('active', isOpen);
    menuToggle.setAttribute('aria-expanded', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });

  mobileNav.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      mobileNav.classList.remove('open');
      menuToggle.classList.remove('active');
      menuToggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    });
  });

  // ── Glitch ──
  function spawnGlitch(x, y) {
    if (Math.random() > 0.25) return;
    const g = document.createElement("div");
    g.classList.add("glitch-fragment");
    const types = ["square","square","vertical","horizontal","pixel"];
    const type  = types[Math.floor(Math.random()*types.length)];
    if(type==="square"){const s=5+Math.random()*16; g.style.width=s+"px"; g.style.height=s+"px";}
    if(type==="vertical"){g.style.width=2+Math.random()*6+"px"; g.style.height=15+Math.random()*45+"px";}
    if(type==="horizontal"){g.style.width=15+Math.random()*45+"px"; g.style.height=2+Math.random()*6+"px";}
    if(type==="pixel"){g.style.width="4px"; g.style.height="4px";}
    g.style.left = x+(Math.random()*200-100)+"px";
    g.style.top  = y+(Math.random()*200-100)+"px";
    g.style.setProperty("--dx",(Math.random()*200-100)+"px");
    g.style.setProperty("--dy",(Math.random()*200-100)+"px");
    const intensity=0.15+Math.random()*0.35;
    const blur1=2+Math.random()*4;
    const blur2=5+Math.random()*8;
    g.style.boxShadow=`0 0 ${blur1}px 1px rgba(255,255,255,${intensity}), 0 0 ${blur2}px 2px rgba(255,255,255,${intensity*0.4})`;
    document.body.appendChild(g);
    setTimeout(()=>g.remove(), 2000);
  }

  document.addEventListener("mousemove", e => spawnGlitch(e.clientX, e.clientY));
  document.addEventListener("touchmove", e => spawnGlitch(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
</script>

</body>
</html>
