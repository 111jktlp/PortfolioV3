<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enrico Cesarin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ─────────────────────────────────────────
   RESET
───────────────────────────────────────── */

*,
*::before,
*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
}

body{
  background:#000;
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
  -webkit-font-smoothing:antialiased;
   cursor: url(assets/img/chromehearts3.png) 32 32, auto; 
  
}
    
a,
button{
    cursor: url(assets/img/chromehearts3.png) 32 32, pointer;
}
/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */

header{
    position:sticky;      /* oppure sticky se preferisci */
    top:0;
    left:0;
    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 40px;

    background:rgba(0,0,0,.9); /* oppure transparent */
    backdrop-filter:blur(8px); /* opzionale */
    font-family: monospace;
    z-index:9999;
}
.logo{
  font-size:.8rem;
  font-weight:700;
  letter-spacing:2.5px;
  text-transform:uppercase;
  opacity:.9;
  z-index:2;
}

.main-nav{
    display:flex;
    gap:42px;
    margin-left:auto;
}

.nav-link{
  position:relative;
  text-decoration:none;
  color:#8d8d8d;
  font-size:.72rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:3px;
  transition:color .3s ease;
}

.nav-link:hover{
  color:#fff;
}

.nav-link::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-8px;
  width:100%;
  height:1px;
  background:#fff;
  transform:scaleX(0);
  transform-origin:center;
  transition:transform .35s ease;
}

.nav-link:hover::after{
  transform:scaleX(1);
}

.nav-link.active{
  color:#fff;
}

.nav-link.active::after{
  transform:scaleX(1);
}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1800px;
    overflow:hidden;
}
.carousel{

    position:relative;

    width:500px;
    height:500px;
    transform-style:preserve-3d;
   
    transform:rotateX(-10deg);
    
    transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1);
}

.card{

    position:absolute;

    top:45%;
    left:50%;
    transform:translate(-50%, -50%);
    display:flex;
    flex-direction:column;
    align-items:center;

    text-decoration:none;
    color:white;

    transform-style:preserve-3d;
    
    transition:
    transform .8s cubic-bezier(.22,.61,.36,1),
    opacity .5s;
} 

.card img{

    width:100px;

    transition:.6s;
} 

.card span{

    margin-top:25px;

    letter-spacing:5px;

    font-size:.75rem;
} 
    
.front{
    transform:
        translate(-50%, -50%)
        rotateY(0deg)
        translateZ(300px);
    /* niente z-index qui */
}

.front:hover img{
    transform:scale(1.05);
    filter:brightness(1.15);
} 
    

.left{
    transform:
        translate(-50%, -50%)
        rotateY(-120deg)
        translateZ(300px);
    /* niente z-index qui */
}
.left:hover img{
    transform:scale(1.05);
    filter:brightness(1.15);
}  
    
    
.right{
    transform:
        translate(-50%, -50%)
        rotateY(120deg)
        translateZ(300px);
    /* niente z-index qui */
}
.right:hover img{
    transform:scale(1.05);
    filter:brightness(1.15);
}    
    
.nav-arrows{
    position: absolute;      /* o fixed, a seconda del tuo layout */
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 285px;         /* distanza dai bordi */
    box-sizing: border-box;

    pointer-events: none;    /* opzionale */
}

.arrow{
    pointer-events: auto;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
}

.arrow img{
    width: 50px;      /* scegli la dimensione */
    height: auto;
    display: block;
    transition: transform .3s ease;
    
}

/* Specchia la freccia sinistra */
#left img{
    transform: scaleX(-1);
}

/* Hover */
.arrow:hover img{
    transform: scale(1.4);
}

/* Mantiene anche lo specchio a sinistra */
#left:hover img{
    transform: scaleX(-1) scale(1.4);
}
/* ─────────────────────────────────────────
   FOOTER
───────────────────────────────────────── */

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:28px 20px;
  display:flex;
  justify-content:center;
}

.social-links{
  display:flex;
  gap:34px;
}

.social-links a{
  color:white;
  font-size:1.4rem;
  transition:
    opacity .3s ease,
    transform .3s ease;
}

.social-links a:hover{
  opacity:.55;
  transform:translateY(-2px);
}

/* ─────────────────────────────────────────
   GLITCH
───────────────────────────────────────── */

.glitch-fragment{
  position:fixed;
  background:white;
  mix-blend-mode:screen;
  pointer-events:none;
  animation:glitchOut 2s forwards;
}

@keyframes glitchOut{
  0%{opacity:1; transform:translate(0,0);}
  50%{opacity:.8;}
  100%{opacity:0; transform:translate(var(--dx), var(--dy));}
}

/* ─────────────────────────────────────────
   HAMBURGER
───────────────────────────────────────── */

.menu-toggle{
  display:none;
  background:none;
  border:none;
  cursor:pointer;
  padding:4px;
  z-index:1002;
  position:relative;
}

.menu-toggle span{
  display:block;
  width:22px;
  height:1px;
  background:white;
  margin:5px 0;
  transition:transform .35s ease, opacity .35s ease;
}

/* ─────────────────────────────────────────
   MOBILE
───────────────────────────────────────── */

@media(max-width:900px){

    
  html,
body{
    overflow-x:hidden;
}  
    
    
  header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 22px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:1000;
  }

  .logo{
    position:absolute;
    left:25%;
    transform:translateX(-50%);
  }

  .menu-toggle{
    display:block;
    position:absolute;
    right:22px;
  }

  .menu-toggle.active span:nth-child(1){
    transform:translateY(6px) rotate(45deg);
  }
  .menu-toggle.active span:nth-child(2){
    opacity:0;
  }
  .menu-toggle.active span:nth-child(3){
    transform:translateY(-6px) rotate(-45deg);
  }

  .main-nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:40px;

    transform:translateX(100%);
    visibility:hidden;
    opacity:0;

    transition:
      transform .45s ease,
      opacity   .35s ease,
      visibility 0s linear .45s;

    z-index:999;
  }

  .main-nav.open{
    transform:translateX(0);
    visibility:visible;
    opacity:1;
    transition:
      transform .45s ease,
      opacity   .35s ease,
      visibility 0s linear 0s;
  }

  .main-nav .nav-link{
    font-size:1rem;
    letter-spacing:4px;
  }

  ..hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    padding-top:70px;   /* altezza header */
    padding-bottom:40px;
}
  .hero-grid{
    flex-direction:column;
    gap:80px;
  }
    
    
.carousel{
    width:260px;
    height:1060px;
}
    
.card img{
    width:100px;
}
    
    
.front{
    transform:
        translate(-50%, -50%)
        rotateY(0deg)
        translateZ(180px);
    /* niente z-index qui */
}
.left{
    transform:
        translate(-50%, -50%)
        rotateY(-120deg)
        translateZ(180px);
    /* niente z-index qui */
   } 
.right{
    transform:
        translate(-50%, -50%)
        rotateY(120deg)
        translateZ(180px);
    /* niente z-index qui */
    
   } 
    
.nav-arrows{
    display:none;
}    
     
  .portal-link img{
    width:min(72vw, 300px);
  }

  footer{
    position:relative;
    padding:60px 20px 40px;
  }
}
@media (max-width: 900px) and (orientation: landscape){

    .hero{
        min-height:100vh;
        padding-top:60px;
        padding-bottom:20px;
    }

    .carousel{
        width:220px;
        height:190px;
    }

    .card img{
        width:100px;
    }

    .front{
        transform:
            translate(-50%, -50%)
            rotateY(0deg)
            translateZ(100px);
    }

    .left{
        transform:
            translate(-50%, -50%)
            rotateY(-120deg)
            translateZ(100px);
    }

    .right{
        transform:
            translate(-50%, -50%)
            rotateY(120deg)
            translateZ(100px);
    }

}
    
</style>
</head>

<body>
 <div clas="custom-cursor site-wide">
    <div class="pointer"></div>
    </div>
</body>    
<!-- HEADER -->
<header>
  <div class="logo">ENRICO CESARIN</div>

  <button class="menu-toggle" id="menu-toggle" aria-label="Menu" aria-expanded="false" aria-controls="mobile-nav">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="main-nav" id="mobile-nav">
    <a href="index.html" class="nav-link active">Home</a>
    <a href="works.html" class="nav-link">Works</a>
    <a href="about.html" class="nav-link">About</a>
  </nav>
</header>

<!-- HERO -->
<main class="hero">
  <div class="carousel">

    <a href="works.html" class="card front" id="works-card">
      <img src="assets/img/spada2.png" alt="Works">
      <span>Works</span>
    </a>

    <a href="about.html" class="card left" id="about-card">
      <img src="assets/img/spada2.png" alt="About">
      <span>About</span>
    </a>

      <a href="workinprogress.html" class="card right" id="new-card">
      <img src="assets/img/spada2.png" alt="About">
      <span>New</span>
    </a>
  </div>
    
   <div class="nav-arrows">

  <button id="left" class="arrow">
    <img src="assets/img/arrow2.png" alt="Precedente">
  </button>

  <button id="right" class="arrow">
    <img src="assets/img/arrow2.png" alt="Successivo">
  </button>

</div>
</main>

   
<!-- FOOTER -->
<footer>
  <div class="social-links">
    <a href="https://www.instagram.com/jacktulo/" target="_blank" aria-label="Instagram">
      <i class="fa-brands fa-instagram"></i>
    </a>
    <a href="https://on.soundcloud.com/Hu8hjfZL8MQTzkFNN5" target="_blank" aria-label="SoundCloud">
      <i class="fa-brands fa-soundcloud"></i>
    </a>
    <a href="https://open.spotify.com/playlist/4Y6WbuDnoUpmHGoTTx4UJ4?si=ac823859338f4cfa" target="_blank" aria-label="Spotify">
      <i class="fa-brands fa-spotify"></i>
    </a>
    <a href="mailto:enri.cesarin4@gmail.com" aria-label="Email">
      <i class="fa-regular fa-envelope"></i>
    </a>
  </div>
</footer>

<script>
  // ── Hamburger ──
  const menuToggle = document.getElementById('menu-toggle');
  const mobileNav  = document.getElementById('mobile-nav');

  menuToggle.addEventListener('click', () => {
    const isOpen = mobileNav.classList.toggle('open');
    menuToggle.classList.toggle('active', isOpen);
    menuToggle.setAttribute('aria-expanded', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });

  mobileNav.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      mobileNav.classList.remove('open');
      menuToggle.classList.remove('active');
      menuToggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    });
  });
    
 // ── Hero animation ──   
    
let angle = 0;
const carousel = document.querySelector(".carousel");

function rotate(dir){
  angle += dir * 120;
  carousel.style.transform = `rotateX(-10deg) rotateY(${angle}deg)`;
}

document.getElementById("left").addEventListener("click", () => {
  rotate(-1);
});

document.getElementById("right").addEventListener("click", () => {
  rotate(1);
});
    
document.querySelectorAll(".card").forEach(card => {

  card.addEventListener("click", (e) => {

    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;

    const center = x > rect.width * 0.35 && x < rect.width * 0.65;

    if (center) {
      window.location.href = card.href;
    }

  });

});    
    
  // ── Glitch ──
  function spawnGlitch(x, y) {
    if (Math.random() > 0.25) return;
    const g = document.createElement("div");
    g.classList.add("glitch-fragment");
    const types = ["square","square","vertical","horizontal","pixel"];
    const type  = types[Math.floor(Math.random()*types.length)];
    if(type==="square"){const s=5+Math.random()*16; g.style.width=s+"px"; g.style.height=s+"px";}
    if(type==="vertical"){g.style.width=2+Math.random()*6+"px"; g.style.height=15+Math.random()*45+"px";}
    if(type==="horizontal"){g.style.width=15+Math.random()*45+"px"; g.style.height=2+Math.random()*6+"px";}
    if(type==="pixel"){g.style.width="4px"; g.style.height="4px";}
    g.style.left = x+(Math.random()*200-100)+"px";
    g.style.top  = y+(Math.random()*200-100)+"px";
    g.style.setProperty("--dx",(Math.random()*200-100)+"px");
    g.style.setProperty("--dy",(Math.random()*200-100)+"px");
    const intensity=0.15+Math.random()*0.35;
    const blur1=2+Math.random()*4;
    const blur2=5+Math.random()*8;
    g.style.boxShadow=`0 0 ${blur1}px 1px rgba(255,255,255,${intensity}), 0 0 ${blur2}px 2px rgba(255,255,255,${intensity*0.4})`;
    document.body.appendChild(g);
    setTimeout(()=>g.remove(), 2000);
  }

  document.addEventListener("mousemove", e => spawnGlitch(e.clientX, e.clientY));
  document.addEventListener("touchmove", e => spawnGlitch(e.touches[0].clientX, e.touches[0].clientY), {passive:true});

  // ──Swape ──  
    
  let startX = 0;

carousel.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
});

carousel.addEventListener("touchend",(e)=>{

    let endX = e.changedTouches[0].clientX;

    if(endX-startX > 40){
        rotate(1);
    }

    if(startX-endX > 40){
        rotate(-1);
    }

});  
    
    
    
    </script>
    
    
    
    
    
    
    
    

</body>
